        items:
          type: string
        type: array
      contextWindowTokens:
        description: ContextWindowTokens is the maximum token count accepted by the
          model.
        type: integer
      credentialFields:
        description: |-
          CredentialFields lists the credential inputs shown when configuring this model.
          Only the fields defined here are rendered — e.g. OpenAI shows only "API Key",
          Kling shows "Access Key ID" + "Secret Access Key", Ollama shows nothing.
        items:
          $ref: '#/definitions/hyperstrate_server_internal_modules_ai_domain.CredentialFieldDef'
        type: array
      defaultBaseUrl:
        description: DefaultBaseURL is the provider's canonical API endpoint, pre-filled
          in the configuration UI.
