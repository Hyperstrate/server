info:
  contact: {}
  description: AI model proxy with async job support. Powered by Gin, Fx, GORM, and
    AWS Lambda.
  title: AI Proxy API
  version: "1.0"
paths:
  /ai/catalog:
    get:
      description: Returns all static model definitions available for registration
      parameters:
      - description: Search by key, display name, model id, provider, description,
          or capability
        in: query
        name: query
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/hyperstrate_server_internal_modules_ai_domain.ModelDefinition'
            type: array
      security:
      - BearerAuth: []
      summary: List catalog model definitions
      tags:
      - hyperstrate
      - catalog
  /ai/conversations:
    get:
      description: Returns paginated conversations ordered by creation time
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 30, max 500)
        in: query
        name: perPage
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hyperstrate_server_internal_shared_pagination.Paginated-internal_modules_ai_interfaces_http_ConversationResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_modules_ai_interfaces_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List conversations
      tags:
      - hyperstrate
      - conversations
    post:
      consumes:
      - application/json
      description: Creates a new conversation tied to a registered model
      parameters:
      - description: Conversation input
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/hyperstrate_server_internal_modules_ai_application.CreateConversationInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_modules_ai_interfaces_http.ConversationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_modules_ai_interfaces_http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_ai_interfaces_http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_modules_ai_interfaces_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a conversation
      tags:
      - hyperstrate
      - conversations
  /ai/conversations/{id}:
    delete:
      description: Deletes a conversation and all its messages
      parameters:
      - description: Conversation ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_ai_interfaces_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a conversation
      tags:
      - hyperstrate
      - conversations
    get:
      description: Returns a single conversation by ID
      parameters:
      - description: Conversation ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_ai_interfaces_http.ConversationResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_ai_interfaces_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a conversation
      tags:
      - hyperstrate
      - conversations
  /ai/conversations/{id}/messages:
    get:
      description: Returns all messages in a conversation ordered by creation time
      parameters:
      - description: Conversation ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/hyperstrate_server_internal_modules_ai_domain.ConversationMessage'
            type: array
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_ai_interfaces_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List conversation messages
      tags:
      - hyperstrate
      - conversations
    post:
      consumes:
      - application/json
      description: Appends a user or assistant message to an existing conversation
      parameters:
      - description: Conversation ID
        in: path
        name: id
        required: true
        type: string
      - description: Message input
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/hyperstrate_server_internal_modules_ai_application.AddConversationMessageInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/hyperstrate_server_internal_modules_ai_domain.ConversationMessage'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_modules_ai_interfaces_http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_ai_interfaces_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add a message to a conversation
      tags:
      - hyperstrate
      - conversations
  /ai/discover:
    get:
      description: Polls the given Ollama base URL for available models and suggests
        catalog matches
      parameters:
      - description: Ollama base URL (defaults to configured OLLAMA_BASE_URL)
        in: query
        name: baseUrl
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                items:
                  $ref: '#/definitions/internal_modules_ai_interfaces_http.DiscoveredModel'
                type: array
            type: object
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/internal_modules_ai_interfaces_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Discover models on a local Ollama instance
      tags:
      - hyperstrate
      - models
  /ai/infer:
    post:
      consumes:
      - application/json
      description: Forwards a request to the upstream model and returns the response
        immediately
      parameters:
      - description: Inference request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/hyperstrate_server_internal_modules_ai_application.InferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hyperstrate_server_internal_modules_ai_application.InferenceResult'
