name: Bug report
description: Report something that is broken or behaving unexpectedly.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, requests, config shape, or screenshots when useful. Do not include secrets.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        Hyperstrate commit:
        OS:
        Go version:
        Database:
    validations:
      required: false
