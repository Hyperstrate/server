name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Install tools
        run: |
          go install gotest.tools/gotestsum@latest
          go install github.com/swaggo/swag/cmd/swag@latest

      - name: Test
        run: go test ./...

      - name: Build commands
        run: go build ./cmd/api ./cmd/worker ./cmd/migrate
